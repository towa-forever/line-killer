<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン処理中...</title>
  <style>
    body { margin: 0; background: #0a0a1a; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: -apple-system, sans-serif; }
    .box { text-align: center; color: white; }
    .spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #06c755; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 18px; margin: 0 0 8px; }
    p { font-size: 13px; color: rgba(255,255,255,0.5); margin: 0; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h2 id="msg">ログイン処理中...</h2>
    <p id="sub">しばらくお待ちください</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const linked = params.get('linked');
    const error = params.get('error');

    if (error) {
      document.getElementById('msg').textContent = 'ログインに失敗しました';
      document.getElementById('sub').textContent = error + ' のログインに失敗しました';
      setTimeout(() => { window.location.href = '/'; }, 2500);
    } else if (linked) {
      document.getElementById('msg').textContent = '連携完了！';
      document.getElementById('sub').textContent = linked + ' アカウントと連携しました';
      // 親ウィンドウに通知してからリダイレクト
      if (window.opener) {
        window.opener.postMessage({ type: 'oauth_linked', provider: linked }, '*');
        window.close();
      } else {
        setTimeout(() => { window.location.href = '/'; }, 1500);
      }
    } else if (token) {
      // トークンをlocalStorageに保存してアプリに渡す
      localStorage.setItem('lk_token', token);
      document.getElementById('msg').textContent = 'ログイン成功！';
      document.getElementById('sub').textContent = 'アプリを開いています...';
      setTimeout(() => { window.location.href = '/'; }, 800);
    } else {
      document.getElementById('msg').textContent = 'エラーが発生しました';
      setTimeout(() => { window.location.href = '/'; }, 2000);
    }
  </script>
</body>
</html>
